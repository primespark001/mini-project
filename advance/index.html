<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Ad-Tic-Tac-Toe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
</head>
<body>
    <section class="intro">
        <input type="radio" name="sections" id="welcome" title="Intro" checked>
        <div class="texts">
            <p>😎</p>
            <header>
                <h3>Let's Play</h3>
                <h1>Advanced<br>Tic-Tac-Toe</h1>
            </header>
            <label for="start" class="button">Start</label>      
            <a href="../normal/index.html">Play Normal</a>      
        </div>

        <input type="radio" name="sections" id="start">
        <div class="start">
            <label for="welcome" class="back">⨉</label>
            <i>--Select Mode--</i>
            
            <input type="radio" name="modes" id="pvp" checked>
            <input type="radio" name="modes" id="pvc">

            <section class="settings">                    
                <p class="pvp"><span id="p1Icon">🧑</span>~<span id="p2Icon">👦🏻</span></p>
                <p class="pvc"><span id="pIcon">🧑</span>~<span id="cIcon">🤖</span></p>
                <label for="avatar" title="Change Avatar">⊻</label>
                <input type="checkbox" id="avatar">
                <section class="avatars" id="avatarContainer"></section>
            </section>
            
            <label for="pvp" class="button">Player VS Player</label>
            <label for="pvc" class="button">Player VS Computer</label>

            <section class="difficulty">
                <hr>
                <i>--Select Difficulty--</i>
                <section class="diffCon">
                    <input type="radio" name="difficulty" id="easy" checked>
                    <input type="radio" name="difficulty" id="medium">
                    <input type="radio" name="difficulty" id="hard">
                    <label for="easy">
                        <span>😇</span>
                        <b>Easy</b>
                    </label>
                    <label for="medium">
                        <span>😠</span>
                        <b>Medium</b>
                    </label>
                    <label for="hard">
                        <span>😈</span>
                        <b>Hard</b>
                    </label>
                </section>
            </section>
            <hr>
            <label for="game" class="button" onclick="playGame()">Play</label>
        </div>
        
        
        <input type="radio" name="sections" id="game">
        <div class="board">
            <label for="start" class="back">⨉</label>
            <section class="top">
                <p id="mode">🧑~🤖</p>
                <h4 class="turns" id="turns">Player's Turn</h4>
            </section>
            <hr>
            <section class="boxes">
                <button type="button" id="1" class="box" title="box"></button>
                <button type="button" id="2" class="box" title="box"></button>
                <button type="button" id="3" class="box" title="box"></button>
                <button type="button" id="4" class="box" title="box"></button>
                <button type="button" id="5" class="box" title="box"></button>
                <button type="button" id="6" class="box" title="box"></button>
                <button type="button" id="7" class="box" title="box"></button>
                <button type="button" id="8" class="box" title="box"></button>
                <button type="button" id="9" class="box" title="box"></button>
            </section>
            <hr>
            <b class="diff">Easy</b>
            <section class="bottom">
                <p>🎮: <span class="score">0</span></p>
                <p><span class="icon">🧑</span>: <span class="score">0</span></p>
                <p><span class="icon">🤖</span>: <span class="score">0</span></p>
                <p>🤝: <span class="score">0</span></p>
            </section>
        </div>
    </section>

    <!-- Game over -->
    <div class="gameovercover game-over"></div>
    <div class="gameover game-over">
        <h1>GAME OVER!</h1><hr>
        <div class="windetails">
            <p>
                <span id="icon">👨</span>
                <b class="diff">Easy</b>
            </p>
            <section>
                <h3>STATS</h3>
                <span id="winner" class="span">Player Wins</span>
                <span class="span">P<span class="score">0</span></span>
                <span class="span">W<span class="score">0</span></span>
                <span class="span">D<span class="score">0</span></span>
                <span class="span">L<span class="score">0</span></span>
            </section>
        </div><hr>
        <button type="button" class="button" id="button">Play again</button>
    </div>


    <script src="index.js"></script>
</body>
</html>
